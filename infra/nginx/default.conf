upstream wallet_web {
  server web:3000;
}

upstream wallet_api {
  server api:4000;
}

upstream wallet_fallback {
  server fallback:4100;
}

server {
  listen 80;
  server_name _;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  location /api/ {
    proxy_pass http://wallet_api;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    error_page 502 503 504 = @serverless_fallback;
  }

  location @serverless_fallback {
    proxy_pass http://wallet_fallback;
  }

  location / {
    proxy_pass http://wallet_web;
  }
}
